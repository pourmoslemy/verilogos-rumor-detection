experiment:
  mode: hybrid
  max_events: 0
  random_seed: 42
  device: cpu
data:
  data_path: ./data/acl2017
  balance_classes: false
split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
tda:
  n_workers: 4
  lambda_decay: 0.001
  temporal_window: 60.0
model:
  text_model_name: ./models/bert-base-uncased
  tda_input_dim: 36
  tda_hidden_dims:
  - 128
  - 256
  - 512
  embed_dim: 768
  num_attention_heads: 8
  dropout: 0.3
  freeze_text_encoder: false
  local_files_only: true
training:
  batch_size: 16
  epochs: 20
  learning_rate: 1e-4
  weight_decay: 0.01
  patience: 5
  num_workers: 0
output:
  results_dir: ./results/hybrid
  checkpoint_dir: ./checkpoints/hybrid
