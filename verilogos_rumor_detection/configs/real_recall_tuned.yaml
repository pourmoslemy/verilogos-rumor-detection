experiment:
  mode: hybrid
  max_events: null
  random_seed: 42
  device: cpu

data:
  data_path: ./data/acl2017
  balance_classes: true
  explicit_class_weights:
    fake: 0.67
    real: 1.99

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

tda:
  n_workers: 4
  lambda_decay: 0.001
  temporal_window: 60.0

model:
  text_model_name: bert-base-uncased
  local_files_only: true
  tda_input_dim: 36
  tda_hidden_dims: [128, 256, 512]
  embed_dim: 768
  num_attention_heads: 8
  dropout: 0.3
  freeze_text_encoder: false

training:
  batch_size: 32
  epochs: 20
  learning_rate: 1e-5
  weight_decay: 0.01
  patience: 15
  early_stopping_patience: 15
  num_workers: 0

output:
  results_dir: ./experiments/real_recall_tuned/results
  checkpoint_dir: ./experiments/real_recall_tuned/checkpoints
